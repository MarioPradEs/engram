name: PR Validation

# NOTE (Viva fork): the upstream issue-first checks (check-issue-reference and
# check-issue-approved) were removed because this fork has GitHub Issues
# DISABLED — there is no place to file the "approved issue" they require, so the
# checks were structurally unsatisfiable here. Issue tracking is centralised
# upstream / in the EngramCloud infra repo (where SDD proposals/specs live).
# Only the type:* label gate is kept. Re-add the issue checks if this fork ever
# enables Issues.

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize]

jobs:
  check-type-label:
    name: Check PR Has type:* Label
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR has a type label
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;

            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const labels = pullRequest.labels.map(l => l.name);
            core.info(`PR #${prNumber} labels: ${labels.join(', ') || '(none)'}`);

            const typeLabels = labels.filter(l => l.startsWith('type:'));

            if (typeLabels.length === 0) {
              core.setFailed(
                '❌ PR must have exactly one type:* label.\n' +
                'Valid types: type:bug, type:feature, type:docs, type:refactor, type:chore, type:breaking-change\n' +
                'Add the label to the PR after opening it.'
              );
            } else if (typeLabels.length > 1) {
              core.setFailed(
                `❌ PR has multiple type:* labels: ${typeLabels.join(', ')}.\n` +
                'Please keep exactly one type label.'
              );
            } else {
              core.info(`✅ PR has type label: ${typeLabels[0]}`);
            }
