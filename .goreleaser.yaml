version: 2

project_name: engram

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/engram
    binary: engram
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        - cmd: sh -c 'if [ "{{ .Os }}" = "darwin" ] && command -v codesign >/dev/null 2>&1; then codesign --force --sign - "{{ .Path }}"; fi'

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# NOTE (Viva fork): Homebrew tap publishing is intentionally disabled. The
# upstream tap (Gentleman-Programming/homebrew-tap) is not writable from this
# fork and HOMEBREW_TAP_TOKEN is not configured here. The team installs the
# binary directly from the fork's GitHub Releases (tar.gz / zip). If a Viva
# Homebrew tap is created later, re-add a brews: block pointing at it.
