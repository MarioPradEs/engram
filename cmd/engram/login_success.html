<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conectado · Engram Cloud</title>
  <style>
    :root{
      --viva-orange:#F5821F;
      --bg:#060607;
      --card:#101012;
      --card-border:rgba(245,130,31,.22);
      --text:#FFFFFF;
      --text-dim:#9A9AA2;
      --ok:#3DD68C;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(1100px 560px at 50% -12%, rgba(245,130,31,.14), transparent 62%),
        var(--bg);
      color:var(--text);
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:24px;
      -webkit-font-smoothing:antialiased;
    }
    .card{
      width:100%; max-width:420px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0)), var(--card);
      border:1px solid var(--card-border);
      border-radius:18px;
      padding:40px 32px 32px;
      text-align:center;
      box-shadow:0 24px 60px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .logo{ max-width:300px; margin:0 auto 26px; }
    .logo img{
      width:100%; height:auto; display:block;
      /* Difuminado de bordes (igual que el login): desvanece el rectángulo
         negro del wordmark para que se funda con la tarjeta. */
      -webkit-mask-image:
        linear-gradient(to right, transparent 0, #000 8%, #000 92%, transparent 100%),
        linear-gradient(to bottom, transparent 0, #000 10%, #000 90%, transparent 100%);
      -webkit-mask-composite: source-in;
      mask-image:
        linear-gradient(to right, transparent 0, #000 8%, #000 92%, transparent 100%),
        linear-gradient(to bottom, transparent 0, #000 10%, #000 90%, transparent 100%);
      mask-composite: intersect;
    }
    .check{
      width:66px; height:66px; margin:0 auto 14px;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      background:rgba(61,214,140,.12);
      border:1px solid rgba(61,214,140,.5);
      box-shadow:0 0 0 7px rgba(61,214,140,.06), 0 0 26px rgba(61,214,140,.25);
    }
    .check svg{ width:34px; height:34px; }
    .status{ color:var(--ok); font-size:.78rem; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; margin-bottom:14px; }
    .title{ font-size:1.22rem; font-weight:600; }
    .subtitle{ margin-top:10px; color:var(--text-dim); font-size:.9rem; line-height:1.55; }
    .btn{
      display:inline-block; margin-top:22px;
      background:var(--viva-orange); color:#000;
      font-weight:700; font-size:.92rem;
      text-decoration:none; border-radius:10px;
      padding:11px 22px;
      transition:filter .15s ease;
    }
    .btn:hover{ filter:brightness(1.08); }
  </style>
</head>
